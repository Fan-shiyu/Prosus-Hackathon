name: "health_scare"
display_name: "Health Scare"
description: "A viral social media post about food poisoning tanks your reputation. Health inspectors clear you, but recovery takes strategic effort."
difficulty: "hard"
hidden: false

tuning_overrides: {}

events:
  - type: "viral_review"
    day: 10
    params:
      stars: 1.0
      count: 5
    alert: "A customer posted on social media claiming food poisoning at your restaurant. The post is going viral."

  - type: "demand_drop"
    day: 10
    params:
      multiplier: 0.6
      duration_days: 7
    alert: "Customers are avoiding your restaurant due to the food poisoning scare."

  - type: "tuning_override"
    day: 10
    params:
      path: "reputation.bad_review_weight"
      value: 3.0
    alert: "Media scrutiny means negative reviews carry extra weight right now."

  - type: "alert_only"
    day: 15
    alert: "Health inspectors have cleared your restaurant. No violations found."

  - type: "demand_surge"
    day: 17
    params:
      multiplier: 0.9
      duration_days: 5

  - type: "tuning_restore"
    day: 20
    params:
      path: "reputation.bad_review_weight"
    alert: "Media attention has moved on. Review sensitivity returning to normal."
